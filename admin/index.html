<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>관리자 페이지</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>관리자 페이지</h1>
      <p>회원 정보와 서비스 데이터를 관리합니다.</p>
    </div>

    <div class="input-panel">
      <div class="tabs">
        <button class="tab active">회원 관리</button>
      </div>

      <div class="admin-top">
        <h2>회원 관리</h2>
        <input type="text" id="searchInput" placeholder="이름, 닉네임, 이메일 검색">
        <button class="btn-parse" onclick="searchUsers()">검색</button>
      </div>

      <table class="admin-table">
        <thead>
          <tr>
            <th>사용자 ID</th>
            <th>이름</th>
            <th>닉네임</th>
            <th>이메일</th>
            <th>로그인 타입</th>
            <th>가입일</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="userTableBody"></tbody>
      </table>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
